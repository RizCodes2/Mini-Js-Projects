<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Password Generator</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <div class="wrap">

        <div class="header">
            <h1>Password <br> Generator</h1>
            <p>Craft a cryptographically secure password</p>
        </div>

        <div class="output-card">
            <div class="password-display placeholder" id="pwDisplay">Click Generate to Start</div>
            <button id="copyBtn" class="icon-btn" title="Copy">
                <svg viewBox="0 0 24 24">
                    <rect x="9" y="9" width="13" height="13" rx="2" />
                    <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" />
                </svg>
            </button>
            <button id="refreshBtn" class="icon-btn" title="Refresh">
                <svg viewBox="0 0 24 24">
                    <path d="M1 4v6h6" />
                    <path d="M23 20v-6h-6" />
                    <path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15" />
                </svg>
            </button>
        </div>

        <div class="strength-bar">
            <div class="strength-seg" id="s1"></div>
            <div class="strength-seg" id="s2"></div>
            <div class="strength-seg" id="s3"></div>
            <div class="strength-seg" id="s4"></div>
            <span class="strength-label" id="strengthLabel">Weak</span>
        </div>

        <div class="controls">

            <div class="slider-row">
                <div class="slider-label">
                    <span>Length</span>
                    <strong id="lenVal">16</strong>
                </div>
                <input type="range" min="8" max="64" value="16" step="1" id="lenSlider">
            </div>

            <div class="toggles">

                <div class="toggle-row active" data-key="upper">
                    <div class="toggle-box">
                        <svg viewBox="0 0 12 12">
                            <polyline points="2,6 5,9 10,3" />
                        </svg>
                    </div>
                    <span class="toggle-text">Uppercase (A–Z)</span>
                </div>

                <div class="toggle-row active" data-key="lower">
                    <div class="toggle-box">
                        <svg viewBox="0 0 12 12">
                            <polyline points="2,6 5,9 10,3" />
                        </svg>
                    </div>
                    <span class="toggle-text">Lowercase (a–z)</span>
                </div>

                <div class="toggle-row active" data-key="nums">
                    <div class="toggle-box">
                        <svg viewBox="0 0 12 12">
                            <polyline points="2,6 5,9 10,3" />
                        </svg>
                    </div>
                    <span class="toggle-text">Numbers (0–9)</span>
                </div>

                <div class="toggle-row active" data-key="syms">
                    <div class="toggle-box">
                        <svg viewBox="0 0 12 12">
                            <polyline points="2,6 5,9 10,3" />
                        </svg>
                    </div>
                    <span class="toggle-text">Symbols (!@#…)</span>
                </div>

                <div class="toggle-row" data-key="noamb">
                    <div class="toggle-box">
                        <svg viewBox="0 0 12 12">
                            <polyline points="2,6 5,9 10,3" />
                        </svg>
                    </div>
                    <span class="toggle-text">No ambiguous (0Ol1)</span>
                </div>
            </div>
        </div>

        <button class="generate-btn" id="genBtn">Generate Password</button>
        <div class="copied-toast" id="toast">Copied to clipboard!</div>

    </div>
    <script src="app.js"></script>
</body>

</html>
