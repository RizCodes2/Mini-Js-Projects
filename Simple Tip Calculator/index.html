<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tip Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="main-wrap">
        <h2>Tip Calculator</h2>
        <div class="input-group">
            <label for="">Bill</label>
            <div class="input-section">
                <input type="text" name="bill" id="bill" value="">
                <span>Pkr</span>
            </div>
        </div>
        <div class="input-group">
            <label for="">Tip Percentage</label>
            <div class="input-section" id="tip-per">
                <input type="text" name="tip-percentage" id="tip-percentage" value="">
                <span>%</span>

            </div>
        </div>
        <div class="input-group">
            <label for="">Tip Amount</label>
            <div class="input-section">
                <input type="text" name="Tip-Amount" id="Tip-Amount" value="">
                <span>Pkr</span>
            </div>
        </div>
        <div class="input-group">
            <label for="totalbill">Total Bill</label>
            <div class="input-section">
                <input type="text" name="totalbill" id="totalbill" value="">
                <span>Pkr</span>
            </div>
        </div>
    </div>

    </div>
    <script src="app.js"></script>

</body>

</html>
