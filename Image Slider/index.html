<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slider</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>Image Slider</h1>
        <div class="upper-slider">
            <div><button id="previous-btn1">PREV</button></div>
            <div class="upper-image-section">
                <img id="uper-image" src="images/image 1.jpg" width="400px" height="200px" alt="">
            </div>
            <div><button id="next-btn1">NEXT</button></div>
        </div>

        <h1>Animated Image Slider</h1>

        <div class="lower-slider">
            <div><button id="previous-btn2">PREV</button></div>
            <div class="mainslider">
                <div class="lower-image-section">
                    <img src="images/image 1.jpg" alt="">
                    <img src="images/image 2.jpg" alt="">
                    <img src="images/image 3.jpg" alt="">
                    <img src="images/image 4.jpg" alt="">
                </div>
            </div>
            <div><button id="next-btn2">NEXT</button></div>
            
        </div>
    </div>
    <script src="app.js"></script>
</body>

</html>
