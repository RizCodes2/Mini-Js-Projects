<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Mockup</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="mockup-sec">
            <p class="shirt-name">Twill Weave T-Shirt ,
                Design</p>
            <div class="shirt-sec">
                <img id="Tshirt" src="Shirts/Black Shirt.png" height="250px" width="200px" alt="">
                <p id="Tshirt-text">Rizwan Ali</p>
            </div>
        </div>
        <div class="changing-sec">
            <div class="about-tshirt">
                <p>Tshirt-Text : </p>
                <input type="text" id="shirt-user-text" placeholder="Enter Text ...">
            </div>
            <div class="font">
                <p>Font</p>
                <select name="" id="font-selection">
                    <option value="Arial">Arial</option>
                    <option value="Courier New">Courier New</option>
                    <option value="Georgia">Georgia</option>
                    <option value="Impact">Impact</option>
                    <option value="Times New Roman">Times New Roman</option>
                </select>
            </div>
            <div class="colors">
                <p>Colors</p>
                <div class="clrs-pallets">
                    <div id="black-color" class="color-box clr-btn" data-shirt="black"
                        style="background-color: #1B1A1A;"></div>
                    <div id="blue-color" class="color-box clr-btn" data-shirt="blue" style="background-color: #113661;">
                    </div>
                    <div id="brown-color" class="color-box clr-btn" data-shirt="brown"
                        style="background-color: #643622;"></div>
                    <div id="green-color" class="color-box clr-btn" data-shirt="green"
                        style="background-color: #169069;"></div>
                    <div id="orange-color" class="color-box clr-btn" data-shirt="orange"
                        style="background-color: #D5520C;"></div>
                    <div id="red-color" class="color-box clr-btn" data-shirt="red" style="background-color: #A2182C;">
                    </div>
                    <div id="white-color" class="color-box clr-btn" data-shirt="white" style="background-color: #ffff;">
                    </div>
                </div>
            </div>
            <button id="apply-btn">
                Apply Text
            </button>
        </div>
    </div>
    <script src="app.js"></script>
</body>

</html>
